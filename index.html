<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Rivers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Emoji:wght@300..700&display=swap"
    rel="stylesheet">
    <style>
        :root {
            --color-bg: #1a3a1a;
            --color-dark: #1e4d2b;
            --color-felt: #7A5C4F;
            --color-pink: #ff8db6;
            --color-text: #f0ead6;
            --color-red: #c0392b;
            --color-capture-glow: rgba(46, 204, 113);
            --color-discard-glow: rgba(52, 152, 219);
            --color-forced-glow: rgba(231, 76, 60);
            --color-hover-glow: rgba(46, 204, 113);
            --color-river-from: #1A4F83;
            --color-river-to: #508FB8;
            --color-separator: rgba(255, 255, 255, 0.08);
            --color-card-shadow: rgba(0, 0, 0, 0.4);
            --color-overlay: rgba(0, 0, 0, 0.6);
            --color-bright: #ffd700;
            --color-animal: #e67e22;
            --color-ribbon: #e74c3c;
            --color-junk: #95a5a6;

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body,
        #root {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        .noto-emoji {
            font-family: "Noto Emoji", sans-serif;
            font-optical-sizing: auto;
            font-style: normal;
        }

    <div id="root"></div>
