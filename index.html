<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Rivers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --color-bg: #1a3a1a;
            --color-bg-light: #2a5a2a;
            --color-dark: #1e4d2b;
            --color-dark-overlay: rgba(141, 109, 94, 0.85);
            --color-felt: #7A5C4F;
            --color-gold: #d4a843;
            --color-gold-dim: #8a7030;
            --color-text: #f0ead6;
            --color-red: #c0392b;
            --color-blue: #2980b9;
            --color-highlight: rgba(255, 215, 0, 0.5);
            --color-capture-glow: rgba(46, 204, 113, 0.6);
            --color-discard-glow: rgba(52, 152, 219, 0.4);
            --color-forced-glow: rgba(231, 76, 60, 0.6);
            --color-hover-glow: rgba(46, 204, 113, 0.35);
            --color-river-from: #1A4F83;
            --color-river-mid: #508FB8;
            --color-river-to: #E4E2CC;
            --color-separator: rgba(255, 255, 255, 0.08);
            --color-card-shadow: rgba(0, 0, 0, 0.4);
            --color-overlay: rgba(0, 0, 0, 0.6);
            --color-bright: #ffd700;
            --color-animal: #e67e22;
            --color-ribbon: #e74c3c;
            --color-junk: #95a5a6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body,
        #root {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script crossorigin
        src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin
        src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="flowerrivers.jsx"></script>
    <script type="text/babel">
        ReactDOM.createRoot(document.getElementById('root')).render(<FlowerRivers />);
    </script>
</body>

</html>
